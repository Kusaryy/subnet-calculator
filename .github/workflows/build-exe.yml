name: Build Subnetzrechner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Subnetzrechner-Windows
            artifact: dist/Subnetzrechner.exe
          - os: macos-latest
            name: Subnetzrechner-macOS
            artifact: dist/Subnetzrechner.zip
          - os: ubuntu-latest
            name: Subnetzrechner-Linux
            artifact: dist/Subnetzrechner

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller

      - name: EXE bauen (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "Subnetzrechner" subnet_gui.py

      - name: App bauen (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name "Subnetzrechner" subnet_gui.py
          codesign --deep --force --sign - dist/Subnetzrechner.app
          cd dist && zip -r Subnetzrechner.zip Subnetzrechner.app

      - name: Abhängigkeiten installieren (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Binary bauen (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller --onefile --name "Subnetzrechner" subnet_gui.py

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Subnetzrechner v${{ github.run_number }}"
          body: |
            ## Subnetzrechner

            Automatisch gebaute Binärdateien für Windows und macOS.

            | Plattform | Datei |
            |-----------|-------|
            | Windows   | `Subnetzrechner.exe` — direkt ausführbar |
            | macOS     | `Subnetzrechner.zip` — siehe Anleitung unten |
            | Linux     | `Subnetzrechner` — `chmod +x Subnetzrechner && ./Subnetzrechner` |

            ### macOS Installation

            Da die App nicht von Apple notarisiert ist, erscheint eine Sicherheitswarnung. So öffnest du sie trotzdem:

            **Option 1 – Terminal (empfohlen):**
            ```bash
            xattr -cr ~/Downloads/Subnetzrechner.app
            open ~/Downloads/Subnetzrechner.app
            ```

            **Option 2 – Rechtsklick:**
            1. ZIP entpacken
            2. **Rechtsklick** auf `Subnetzrechner.app` → **Öffnen**
            3. Im Dialog auf **Öffnen** klicken (nicht Abbrechen)

            **Option 3 – Systemeinstellungen:**
            1. App einmal anklicken (schlägt fehl)
            2. Systemeinstellungen → Datenschutz & Sicherheit → **Trotzdem öffnen**
          files: |
            artifacts/Subnetzrechner-Windows/Subnetzrechner.exe
            artifacts/Subnetzrechner-macOS/Subnetzrechner.zip
            artifacts/Subnetzrechner-Linux/Subnetzrechner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
